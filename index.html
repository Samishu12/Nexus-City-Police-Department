<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>NCPD MDT</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="login">
    <div class="loginBox">
        <h1>NCPD MDT</h1>
        <input id="user" placeholder="Username">
        <input
            id="pass"
            type="password"
            placeholder="Password">
        <button onclick="login()">
            Login
        </button>
    </div>
</div>

<div id="app" style="display:none;">
<aside class="sidebar">
    <h1>Nexus City</h1>
    <h2>Police Department</h2>
    <input id="search" placeholder="Rechercher un citoyen">
    <button onclick="searchCitizen()">Recherche</button>

    <button onclick="loadPlaintes()">Plaintes</button>
    <button onclick="loadMembers()">Membres</button>
    <button onclick="newCitizen()">Nouveau citoyen</button>

    <div class="userPanel">
        <div id="userName">Utilisateur</div>
        <div id="userGrade">Grade</div>

        <button onclick="logout()">
            Déconnexion
        </button>
    </div>
</aside>

  <main id="content">
    <h1>Bienvenue</h1>
  </main>
</div>

<script src="app.js"></script>
</body>
</html>
